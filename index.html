<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>暗記カード｜司法試験対策</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

:root {
  --bg: #f5f6fa;
  --surface: #ffffff;
  --surface2: #eef0f6;
  --surface3: #e2e5ee;
  --text: #1a1d27;
  --text2: #6b7085;
  --accent: #4a6adf;
  --accent2: #3a56c5;
  --correct: #16a34a;
  --incorrect: #dc2626;
  --warning: #d97706;
  --border: rgba(0,0,0,0.08);
  --radius: 16px;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --header-bg: rgba(245,246,250,0.92);
}

body.dark {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --surface3: #2e3345;
  --text: #e8eaf0;
  --text2: #9a9fb5;
  --accent: #6c8cff;
  --accent2: #4a6adf;
  --correct: #34d399;
  --incorrect: #f87171;
  --warning: #fbbf24;
  --border: rgba(255,255,255,0.06);
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --header-bg: rgba(15,17,23,0.92);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'Zen Kaku Gothic New', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}
.header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.app-title { font-size:18px; font-weight:700; letter-spacing:-0.02em; }
.app-title span { color: var(--accent); }
.stats-row { display:flex; gap:12px; font-size:12px; color:var(--text2); }
.stat-badge { background:var(--surface2); padding:3px 10px; border-radius:20px; }
.stat-badge.correct { color:var(--correct); }
.stat-badge.incorrect { color:var(--incorrect); }

/* Filter bar */
.filter-bar {
  display:flex; gap:8px; overflow-x:auto; padding:8px 16px 12px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display:none; }
.filter-chip {
  flex-shrink:0;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-chip.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.filter-chip:active { transform: scale(0.95); }

/* Card area */
.card-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 100px;
  min-height: calc(100vh - 180px);
}

/* Flip card */
.card-container {
  width: 100%;
  max-width: 480px;
  perspective: 1200px;
  margin-bottom: 20px;
}
.card-flip {
  position: relative;
  width: 100%;
  min-height: 380px;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
  cursor: pointer;
}
.card-flip.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  top: 0; left: 0; right: 0;
  min-height: 320px;
  max-height: 520px;
  overflow-y: auto;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: var(--radius);
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow);
}
.card-front {
  background: var(--surface);
  border: 1px solid var(--border);
}
.card-back {
  background: var(--surface);
  border: 1px solid rgba(74,106,223,0.2);
  transform: rotateY(180deg);
}
body.dark .card-front {
  background: linear-gradient(145deg, var(--surface), var(--surface2));
}
body.dark .card-back {
  background: linear-gradient(145deg, #1e2235, #252a3e);
  border-color: rgba(108,140,255,0.15);
}

.card-tag-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.card-tag {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  letter-spacing: 0.02em;
}
.tag-skill { background: rgba(108,140,255,0.15); color: var(--accent); }
.tag-subject { background: rgba(52,211,153,0.12); color: var(--correct); }
.tag-source { background: rgba(251,191,36,0.12); color: var(--warning); }
.tag-answer-o { background: rgba(52,211,153,0.18); color: var(--correct); }
.tag-answer-x { background: rgba(248,113,113,0.18); color: var(--incorrect); }

.card-label { font-size:11px; color:var(--text2); margin-bottom:6px; letter-spacing:0.04em; }
.card-title { font-size:15px; font-weight:700; margin-bottom:16px; line-height:1.5; color:var(--text); }

.card-question, .card-answer {
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  flex: 1;
  word-break: break-word;
  overflow-wrap: break-word;
}
.card-question { font-weight: 400; }

.card-hint {
  margin-top: 16px;
  font-size: 11px;
  color: var(--text2);
  text-align: center;
  opacity: 0.7;
}

.card-section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
  letter-spacing: 0.06em;
}
.card-detail {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text2);
  margin-bottom: 12px;
}
.card-detail:last-child { margin-bottom:0; }

/* Buttons */
.btn-row {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 480px;
  margin-bottom: 12px;
}
.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:active { transform: scale(0.96); }
.btn-correct { background: rgba(52,211,153,0.15); color: var(--correct); }
.btn-incorrect { background: rgba(248,113,113,0.15); color: var(--incorrect); }
.btn-skip { background: var(--surface2); color: var(--text2); }
.btn-next { background: var(--accent); color: #fff; }
.btn-review { background: rgba(251,191,36,0.15); color: var(--warning); }
.btn-review.marked { background: var(--warning); color: #1a1d27; }

.nav-row {
  display: flex;
  gap: 12px;
  width: 100%;
  max-width: 480px;
}
.btn-nav {
  flex: 1;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  color: var(--text2);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-nav:active { transform: scale(0.96); }
.btn-nav:disabled { opacity: 0.3; }

/* Progress bar */
.progress-bar {
  width: 100%;
  max-width: 480px;
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* Modal / Settings */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 520px;
  max-height: 70vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--surface3);
  border-radius: 2px;
  margin: 0 auto 20px;
}
.modal-title { font-size:16px; font-weight:700; margin-bottom:16px; }

.filter-section { margin-bottom: 20px; }
.filter-section-title { font-size:12px; color:var(--text2); margin-bottom:8px; font-weight:500; }
.filter-options { display:flex; gap:6px; flex-wrap:wrap; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state .msg { font-size: 15px; line-height: 1.6; }

/* Summary */
.summary {
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow);
  text-align: center;
}
.summary-title { font-size: 20px; font-weight: 900; margin-bottom: 20px; }
.summary-stats { display:flex; justify-content:center; gap:24px; margin-bottom:24px; }
.summary-stat { text-align:center; }
.summary-stat .num { font-size:32px; font-weight:900; }
.summary-stat .label { font-size:11px; color:var(--text2); margin-top:4px; }
.summary-stat.correct .num { color: var(--correct); }
.summary-stat.incorrect .num { color: var(--incorrect); }

.settings-btn {
  background: none; border: none;
  color: var(--text2); font-size: 20px;
  cursor: pointer; padding: 4px;
}

/* Responsive tweaks */
@media (min-width: 768px) {
  .card-face { min-height: 360px; padding: 36px 32px; }
  .card-question, .card-answer { font-size: 16px; }
}

/* Attempt history */
.attempt-history {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: 10px;
}
.attempt-dot {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 6px;
  background: var(--surface3);
  color: var(--text2);
  white-space: nowrap;
}
.attempt-count {
  font-size: 10px;
  color: var(--text2);
  margin-left: auto;
  font-weight: 500;
}

/* Memo */
.memo-section {
  margin-top: 14px;
}

/* SRS info */
.srs-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 10px;
  font-size: 11px;
  color: var(--text2);
}
.srs-info.srs-due {
  background: rgba(251,191,36,0.12);
  color: var(--warning);
  font-weight: 600;
}
.srs-label { font-weight: 500; }
.srs-interval { opacity: 0.8; }

.filter-chip.due {
  background: rgba(251,191,36,0.18);
  color: var(--warning);
  border-color: var(--warning);
  font-weight: 700;
}
.memo-input {
  width: 100%;
  min-height: 60px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
}
.memo-input:focus {
  border-color: var(--accent);
}
.memo-input::placeholder {
  color: var(--text2);
  opacity: 0.6;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">暗記カード<span>｜司法試験</span></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="settings-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button class="settings-btn" onclick="toggleFilterModal()">⚙️</button>
      <button class="settings-btn" onclick="shuffleCards()">🔀</button>
    </div>
  </div>
  <div class="stats-row">
    <span class="stat-badge" id="statTotal">全 0 枚</span>
    <span class="stat-badge correct" id="statCorrect">⭕ 0</span>
    <span class="stat-badge incorrect" id="statIncorrect">❌ 0</span>
    <span class="stat-badge" id="statPos">0 / 0</span>
    <span class="stat-badge" id="statDue" style="color:var(--warning);">🔔 0</span>
  </div>
</div>

<div class="filter-bar" id="filterBar"></div>
<div class="filter-bar" id="subjectBar" style="display:none;"></div>

<div class="card-area" id="cardArea"></div>

<!-- Filter Modal -->
<div class="modal-overlay" id="filterModal" onclick="closeFilterModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">フィルター設定</div>
    <div class="filter-section">
      <div class="filter-section-title">スキル</div>
      <div class="filter-options" id="skillFilters"></div>
    </div>
    <div class="filter-section">
      <div class="filter-section-title">科目</div>
      <div class="filter-options" id="subjectFilters"></div>
    </div>
    <div class="filter-section">
      <div class="filter-section-title">状態</div>
      <div class="filter-options" id="statusFilters"></div>
    </div>
    <div style="margin-top:8px;">
      <button class="btn btn-next" style="width:100%;" onclick="applyFilters();closeFilterModal();">適用する</button>
    </div>
  </div>
</div>

  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(dateStr, days) {
  var parts = dateStr.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isDueToday(cardId) {
  var s = state.srs[cardId];
  if (!s) return false;
  return s.nextReview <= getToday();
}
function getDueCount(skillFilter) {
  var today = getToday();
  var count = 0;
  for (var i = 0; i < CARDS.length; i++) {
    if (!CARDS[i].question) continue;
    if (skillFilter && skillFilter !== 'all' && CARDS[i].skill !== skillFilter) continue;
    var s = state.srs[CARDS[i].id];
    if (s && s.nextReview <= today) count++;
  }
  return count;
}
function getSrsLabel(cardId) {
  var s = state.srs[cardId];
  if (!s) return '';
  var days = SRS_INTERVALS[s.level] || 60;
  var labels = ['1d','3d','7d','14d','30d','60d'];
  return labels[s.level] || '60d+';
}

// ====== STATE ======
var state = {
  filtered: [],
  current: 0,
  flipped: false,
  results: {},
  history: {},
  memos: {},
  srs: {},
  reviewMarked: {},
  filterSkill: 'all',
  filterSubject: 'all',
  filterStatus: 'all',
  completed: false
};

// ====== SKILLS & SUBJECTS ======
var SKILLS = [];
var SUBJECTS = [];
(function() {
  var sk = {}, su = {};
  for (var i = 0; i < CARDS.length; i++) {
    if (CARDS[i].skill) sk[CARDS[i].skill] = true;
    if (CARDS[i].subject) su[CARDS[i].subject] = true;
  }
  for (var k in sk) SKILLS.push(k);
  for (var k in su) SUBJECTS.push(k);
  SKILLS.sort();
  SUBJECTS.sort();
})();

// ====== THEME ======
function toggleTheme() {
  var isDark = document.body.classList.toggle('dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  try { localStorage.setItem('ankicard_theme', isDark ? 'dark' : 'light'); } catch(e) {}
}
function initTheme() {
  try {
    var saved = localStorage.getItem('ankicard_theme');
    if (saved === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('themeBtn').textContent = '☀️';
    }
  } catch(e) {}
}

// ====== INIT ======
function init() {
  initTheme();
  loadState();
  buildFilterBar();
  buildFilterModal();
  applyFilters();
}

function loadState() {
  try {
    localStorage.setItem('_test', '1');
    localStorage.removeItem('_test');
    state.canSave = true;
  } catch(e) {
    state.canSave = false;
  }
  if (state.canSave) {
    try {
      var saved = localStorage.getItem('ankicard_state');
      if (saved) {
        var s = JSON.parse(saved);
        if (s.results) state.results = s.results;
        if (s.reviewMarked) state.reviewMarked = s.reviewMarked;
        if (s.history) state.history = s.history;
        if (s.memos) state.memos = s.memos;
        if (s.srs) state.srs = s.srs;
      }
    } catch(e) {}
  }
  if (!state.canSave) {
    setTimeout(function() {
      var banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:300;background:#d97706;color:#1a1d27;text-align:center;padding:10px 16px;font-size:13px;font-weight:600;';
      banner.textContent = '\u26a0 \u30d7\u30ec\u30d3\u30e5\u30fc\u74b0\u5883\u306e\u305f\u3081\u4fdd\u5b58\u3067\u304d\u307e\u305b\u3093\u3002\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u3057\u3066Safari\u3067\u958b\u3044\u3066\u304f\u3060\u3055\u3044\u3002';
      document.body.appendChild(banner);
    }, 500);
  }
}

function saveState() {
  if (!state.canSave) return;
  try {
    localStorage.setItem('ankicard_state', JSON.stringify({
      results: state.results,
      reviewMarked: state.reviewMarked,
      history: state.history,
      memos: state.memos,
      srs: state.srs
    }));
  } catch(e) {}
}

// ====== FILTER BAR (quick) ======
function buildFilterBar() {
  var bar = document.getElementById('filterBar');
  var dueAll = getDueCount('all');
  var chips = [
    { label: '全て', value: 'all' },
    { label: '今日の復習' + (dueAll > 0 ? ' ' + dueAll : ''), value: 'due_today' },
    { label: '間違いのみ', value: 'wrong_only' },
    { label: '要復習', value: 'review' }
  ];
  for (var i = 0; i < SKILLS.length; i++) {
    var short = SKILLS[i].replace('マスター','');
    chips.push({ label: short, value: SKILLS[i] });
  }
  var html = '';
  for (var i = 0; i < chips.length; i++) {
    var active = (i === 0) ? ' active' : '';
    var cls = 'filter-chip' + active;
    if (chips[i].value === 'due_today' && dueAll > 0) cls += ' due';
    html += '<button class="' + cls + '" data-filter="' + chips[i].value + '" onclick="quickFilter(this)">' + chips[i].label + '</button>';
  }
  bar.innerHTML = html;
}

function quickFilter(el) {
  var bar = document.getElementById('filterBar');
  var chips = bar.querySelectorAll('.filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  var val = el.getAttribute('data-filter');
  state.filterSubject = 'all';
  if (val === 'all') {
    state.filterSkill = 'all';
    state.filterStatus = 'all';
  } else if (val === 'review') {
    state.filterSkill = 'all';
    state.filterStatus = 'review';
  } else if (val === 'due_today') {
    state.filterSkill = 'all';
    state.filterStatus = 'due_today';
  } else if (val === 'wrong_only') {
    state.filterSkill = 'all';
    state.filterStatus = 'wrong_only';
  } else {
    state.filterSkill = val;
    state.filterStatus = 'all';
  }
  buildSubjectBar();
  applyFilters();
}

function getSubjectsForSkill(skill) {
  var subs = {};
  for (var i = 0; i < CARDS.length; i++) {
    if (!CARDS[i].question) continue;
    if (skill !== 'all' && CARDS[i].skill !== skill) continue;
    if (CARDS[i].subject) subs[CARDS[i].subject] = (subs[CARDS[i].subject] || 0) + 1;
  }
  return subs;
}

function buildSubjectBar() {
  var bar = document.getElementById('subjectBar');
  // Show subject bar for skill-specific or status-specific filters
  if (state.filterSkill === 'all' && state.filterStatus === 'all') {
    bar.style.display = 'none';
    return;
  }
  var subs = {};
  for (var i = 0; i < CARDS.length; i++) {
    var c = CARDS[i];
    if (!c.question) continue;
    if (state.filterSkill !== 'all' && c.skill !== state.filterSkill) continue;
    if (state.filterStatus === 'review' && !c.checked && !state.reviewMarked[c.id]) continue;
    if (state.filterStatus === 'due_today') {
      var s = state.srs[c.id];
      if (!s || s.nextReview > getToday()) continue;
    }
    if (state.filterStatus === 'wrong_only' && state.results[c.id] !== 'incorrect') continue;
    if (c.subject) subs[c.subject] = (subs[c.subject] || 0) + 1;
  }
  var keys = Object.keys(subs).sort();
  if (keys.length <= 1) {
    bar.style.display = 'none';
    return;
  }
  var total = 0;
  for (var i = 0; i < keys.length; i++) total += subs[keys[i]];
  var html = '<button class="filter-chip active" onclick="subjectFilter(this,\'all\')">全科目 <small style="opacity:0.6">' + total + '</small></button>';
  for (var i = 0; i < keys.length; i++) {
    html += '<button class="filter-chip" onclick="subjectFilter(this,\'' + keys[i] + '\')">' + keys[i] + ' <small style="opacity:0.6">' + subs[keys[i]] + '</small></button>';
  }
  bar.innerHTML = html;
  bar.style.display = 'flex';
}

function subjectFilter(el, val) {
  var bar = document.getElementById('subjectBar');
  var chips = bar.querySelectorAll('.filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  state.filterSubject = val;
  applyFilters();
}

// ====== FILTER MODAL ======
function buildFilterModal() {
  // Skills
  var skillHtml = '<button class="filter-chip active" data-val="all" onclick="toggleModalFilter(this,\'skill\')">全て</button>';
  for (var i = 0; i < SKILLS.length; i++) {
    skillHtml += '<button class="filter-chip" data-val="' + SKILLS[i] + '" onclick="toggleModalFilter(this,\'skill\')">' + SKILLS[i].replace('マスター','') + '</button>';
  }
  document.getElementById('skillFilters').innerHTML = skillHtml;

  // Subjects
  var subHtml = '<button class="filter-chip active" data-val="all" onclick="toggleModalFilter(this,\'subject\')">全て</button>';
  for (var i = 0; i < SUBJECTS.length; i++) {
    subHtml += '<button class="filter-chip" data-val="' + SUBJECTS[i] + '" onclick="toggleModalFilter(this,\'subject\')">' + SUBJECTS[i] + '</button>';
  }
  document.getElementById('subjectFilters').innerHTML = subHtml;

  // Status
  var statHtml = '<button class="filter-chip active" data-val="all" onclick="toggleModalFilter(this,\'status\')">全て</button>';
  statHtml += '<button class="filter-chip" data-val="due_today" onclick="toggleModalFilter(this,\'status\')">今日の復習</button>';
  statHtml += '<button class="filter-chip" data-val="wrong_only" onclick="toggleModalFilter(this,\'status\')">間違いのみ</button>';
  statHtml += '<button class="filter-chip" data-val="review" onclick="toggleModalFilter(this,\'status\')">要復習</button>';
  statHtml += '<button class="filter-chip" data-val="unanswered" onclick="toggleModalFilter(this,\'status\')">未回答</button>';
  statHtml += '<button class="filter-chip" data-val="incorrect" onclick="toggleModalFilter(this,\'status\')">不正解のみ</button>';
  document.getElementById('statusFilters').innerHTML = statHtml;
}

function toggleModalFilter(el, group) {
  var parent = el.parentElement;
  var chips = parent.querySelectorAll('.filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  var val = el.getAttribute('data-val');
  if (group === 'skill') state.filterSkill = val;
  if (group === 'subject') state.filterSubject = val;
  if (group === 'status') state.filterStatus = val;
}

function toggleFilterModal() {
  document.getElementById('filterModal').classList.toggle('show');
}
function closeFilterModal(e) {
  if (!e || e.target === document.getElementById('filterModal')) {
    document.getElementById('filterModal').classList.remove('show');
  }
}

// ====== APPLY FILTERS ======
function applyFilters() {
  state.filtered = [];
  var today = getToday();
  for (var i = 0; i < CARDS.length; i++) {
    var c = CARDS[i];
    if (!c.question) continue;
    if (state.filterSkill !== 'all' && c.skill !== state.filterSkill) continue;
    if (state.filterSubject !== 'all' && c.subject !== state.filterSubject) continue;
    if (state.filterStatus === 'review' && !c.checked && !state.reviewMarked[c.id]) continue;
    if (state.filterStatus === 'unanswered' && state.results[c.id]) continue;
    if (state.filterStatus === 'incorrect' && state.results[c.id] !== 'incorrect') continue;
    if (state.filterStatus === 'due_today') {
      var s = state.srs[c.id];
      if (!s || s.nextReview > today) continue;
    }
    if (state.filterStatus === 'wrong_only') {
      if (state.results[c.id] !== 'incorrect') continue;
    }
    state.filtered.push(c);
  }
  state.current = 0;
  state.flipped = false;
  state.completed = false;
  updateStats();
  renderCard();
}

// ====== SHUFFLE ======
function shuffleCards() {
  for (var i = state.filtered.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = state.filtered[i];
    state.filtered[i] = state.filtered[j];
    state.filtered[j] = tmp;
  }
  state.current = 0;
  state.flipped = false;
  state.completed = false;
  renderCard();
}

// ====== STATS ======
function updateStats() {
  var total = state.filtered.length;
  var correct = 0, incorrect = 0;
  for (var i = 0; i < state.filtered.length; i++) {
    var r = state.results[state.filtered[i].id];
    if (r === 'correct') correct++;
    if (r === 'incorrect') incorrect++;
  }
  var dueCount = getDueCount('all');
  document.getElementById('statTotal').textContent = '全 ' + total + ' 枚';
  document.getElementById('statCorrect').textContent = '\u2B55 ' + correct;
  document.getElementById('statIncorrect').textContent = '\u274C ' + incorrect;
  document.getElementById('statPos').textContent = (total > 0 ? (state.current + 1) : 0) + ' / ' + total;
  var dueEl = document.getElementById('statDue');
  if (dueEl) dueEl.textContent = '\uD83D\uDD14 ' + dueCount;
}

// ====== RENDER CARD ======
function renderCard() {
  var area = document.getElementById('cardArea');

  if (state.filtered.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="msg">該当するカードがありません。<br>フィルターを変更してください。</div></div>';
    return;
  }

  if (state.completed) {
    renderSummary();
    return;
  }

  var c = state.filtered[state.current];
  var isMarked = c.checked || state.reviewMarked[c.id];
  var isTanto = (c.correctAnswer !== '' && c.correctAnswer != null);

  var progress = ((state.current) / state.filtered.length * 100);

  var html = '';
  html += '<div class="progress-bar"><div class="progress-fill" style="width:' + progress + '%"></div></div>';

  html += '<div class="card-container"><div class="card-flip" id="cardFlip" onclick="flipCard()">';

  // Front
  html += '<div class="card-face card-front">';
  html += '<div class="card-tag-row">';
  html += '<span class="card-tag tag-skill">' + esc(c.skill || '') + '</span>';
  html += '<span class="card-tag tag-subject">' + esc(c.subject || '') + '</span>';
  if (c.source) html += '<span class="card-tag tag-source">' + esc(c.source) + '</span>';
  if (isTanto) {
    var isO = c.correctAnswer.indexOf('\u25CB') >= 0 || c.correctAnswer.indexOf('\u6B63') >= 0;
    html += '<span class="card-tag ' + (isO ? 'tag-answer-o' : 'tag-answer-x') + '">' + esc(c.correctAnswer) + '</span>';
  }
  html += '</div>';
  // Attempt history
  var hist = state.history[c.id];
  if (hist && hist.length > 0) {
    html += '<div class="attempt-history">';
    var maxShow = 8;
    var start = hist.length > maxShow ? hist.length - maxShow : 0;
    for (var h = start; h < hist.length; h++) {
      var icon = hist[h].result === 'correct' ? '\u2B55' : '\u274C';
      html += '<span class="attempt-dot" title="' + esc(hist[h].date) + '">' + (h - start + 1 + start) + '回' + icon + '</span>';
    }
    html += '<span class="attempt-count">計' + hist.length + '回</span>';
    html += '</div>';
  }
  // SRS info
  var srsInfo = state.srs[c.id];
  if (srsInfo) {
    var dueToday = srsInfo.nextReview <= getToday();
    html += '<div class="srs-info' + (dueToday ? ' srs-due' : '') + '">';
    html += '<span class="srs-label">' + (dueToday ? '🔔 復習日です' : '📅 次回: ' + srsInfo.nextReview) + '</span>';
    html += '<span class="srs-interval">間隔: ' + SRS_INTERVALS[srsInfo.level] + '日</span>';
    html += '</div>';
  }
  html += '<div class="card-label">QUESTION</div>';
  html += '<div class="card-question">' + esc(c.question).replace(/\n/g, '<br>') + '</div>';
  html += '<div class="card-hint">タップで解答を表示</div>';
  html += '</div>';

  // Back
  html += '<div class="card-face card-back">';
  html += '<div class="card-tag-row">';
  html += '<span class="card-tag tag-skill">' + esc(c.skill || '') + '</span>';
  html += '<span class="card-tag tag-subject">' + esc(c.subject || '') + '</span>';
  html += '</div>';
  html += '<div class="card-section-label">ANSWER</div>';
  html += '<div class="card-question">' + esc(c.answer || '（解説なし）').replace(/\n/g, '<br>') + '</div>';
  if (c.statute) {
    html += '<div class="card-section-label" style="margin-top:14px;">根拠条文</div>';
    html += '<div class="card-detail">' + esc(c.statute) + '</div>';
  }
  if (c.trap) {
    html += '<div class="card-section-label">ひっかけポイント</div>';
    html += '<div class="card-detail" style="color:var(--warning);">' + esc(c.trap) + '</div>';
  }
  // Memo
  var memoVal = state.memos[c.id] || '';
  html += '<div class="memo-section" onclick="event.stopPropagation()">';
  html += '<div class="card-section-label" style="margin-top:14px;">📝 メモ</div>';
  html += '<textarea class="memo-input" id="memoInput" placeholder="覚え方・気づき・注意点など自由に…" onclick="event.stopPropagation()" onblur="saveMemo()">' + esc(memoVal) + '</textarea>';
  html += '</div>';
  html += '</div>';

  html += '</div></div>';

  // Buttons
  html += '<div class="btn-row">';
  html += '<button class="btn btn-correct" onclick="markResult(\'correct\')">⭕ 正解</button>';
  html += '<button class="btn btn-incorrect" onclick="markResult(\'incorrect\')">❌ 不正解</button>';
  html += '</div>';

  html += '<div class="btn-row">';
  html += '<button class="btn btn-review' + (isMarked ? ' marked' : '') + '" onclick="toggleReview()">🔖 ' + (isMarked ? '復習済み' : '要復習') + '</button>';
  html += '<button class="btn btn-skip" onclick="nextCard()">スキップ →</button>';
  html += '</div>';

  html += '<div class="nav-row">';
  html += '<button class="btn-nav" onclick="prevCard()"' + (state.current <= 0 ? ' disabled' : '') + '>← 前へ</button>';
  html += '<button class="btn-nav" onclick="nextCard()"' + (state.current >= state.filtered.length - 1 ? ' disabled' : '') + '>次へ →</button>';
  html += '</div>';

  area.innerHTML = html;
  updateStats();
}

function renderSummary() {
  var area = document.getElementById('cardArea');
  var correct = 0, incorrect = 0, skipped = 0;
  for (var i = 0; i < state.filtered.length; i++) {
    var r = state.results[state.filtered[i].id];
    if (r === 'correct') correct++;
    else if (r === 'incorrect') incorrect++;
    else skipped++;
  }
  var total = state.filtered.length;
  var pct = total > 0 ? Math.round(correct / total * 100) : 0;

  var html = '<div class="summary">';
  html += '<div class="summary-title">セッション完了！</div>';
  html += '<div class="summary-stats">';
  html += '<div class="summary-stat correct"><div class="num">' + correct + '</div><div class="label">正解</div></div>';
  html += '<div class="summary-stat incorrect"><div class="num">' + incorrect + '</div><div class="label">不正解</div></div>';
  html += '<div class="summary-stat"><div class="num">' + skipped + '</div><div class="label">未回答</div></div>';
  html += '</div>';
  html += '<div style="font-size:48px;font-weight:900;margin-bottom:20px;color:' + (pct >= 80 ? 'var(--correct)' : pct >= 50 ? 'var(--warning)' : 'var(--incorrect)') + ';">' + pct + '%</div>';
  html += '<div class="btn-row"><button class="btn btn-next" onclick="restart()">もう一度</button></div>';
  html += '<div class="btn-row"><button class="btn btn-review" onclick="retryIncorrect()">不正解のみ再挑戦</button></div>';
  html += '</div>';
  area.innerHTML = html;
}

// ====== INTERACTIONS ======
function flipCard() {
  var el = document.getElementById('cardFlip');
  if (el) {
    state.flipped = !state.flipped;
    if (state.flipped) el.classList.add('flipped');
    else el.classList.remove('flipped');
  }
}

function markResult(result) {
  var c = state.filtered[state.current];
  state.results[c.id] = result;
  // Append to history
  if (!state.history[c.id]) state.history[c.id] = [];
  var today = getToday();
  state.history[c.id].push({ date: today, result: result });
  // SRS update
  var cur = state.srs[c.id] || { level: 0, nextReview: today, lastReview: today };
  if (result === 'correct') {
    cur.level = Math.min(cur.level + 1, SRS_INTERVALS.length - 1);
  } else {
    cur.level = 0;
  }
  cur.lastReview = today;
  cur.nextReview = addDays(today, SRS_INTERVALS[cur.level]);
  state.srs[c.id] = cur;
  saveState();
  nextCard();
}

function toggleReview() {
  var c = state.filtered[state.current];
  if (state.reviewMarked[c.id]) {
    delete state.reviewMarked[c.id];
  } else {
    state.reviewMarked[c.id] = true;
  }
  saveState();
  renderCard();
}

function nextCard() {
  if (state.current < state.filtered.length - 1) {
    state.current++;
    state.flipped = false;
    renderCard();
  } else {
    state.completed = true;
    renderCard();
  }
}

function prevCard() {
  if (state.current > 0) {
    state.current--;
    state.flipped = false;
    renderCard();
  }
}

function restart() {
  state.current = 0;
  state.flipped = false;
  state.completed = false;
  renderCard();
}

function retryIncorrect() {
  var wrong = [];
  for (var i = 0; i < state.filtered.length; i++) {
    if (state.results[state.filtered[i].id] === 'incorrect') {
      wrong.push(state.filtered[i]);
    }
  }
  if (wrong.length === 0) {
    alert('不正解のカードがありません。');
    return;
  }
  state.filtered = wrong;
  state.current = 0;
  state.flipped = false;
  state.completed = false;
  updateStats();
  renderCard();
}

function saveMemo() {
  var c = state.filtered[state.current];
  var el = document.getElementById('memoInput');
  if (el) {
    var val = el.value.trim();
    if (val) {
      state.memos[c.id] = val;
    } else {
      delete state.memos[c.id];
    }
    saveState();
  }
}

function clearHistory(cardId) {
  if (confirm('このカードの回答履歴をリセットしますか？')) {
    delete state.history[cardId];
    delete state.results[cardId];
    saveState();
    renderCard();
  }
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Start
init();
</script>
