// ====== SRS (Spaced Repetition) ======
var SRS_INTERVALS = [1, 3, 7, 14, 30, 60];

function getToday() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(dateStr, days) {
  var parts = dateStr.split('-');
  var d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  d.setDate(d.getDate() + days);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isDueToday(cardId) {
  var s = state.srs[cardId];
  if (!s) return false;
  return s.nextReview <= getToday();
}
function getDueCount(skillFilter) {
  var today = getToday();
  var count = 0;
  for (var i = 0; i < CARDS.length; i++) {
    if (!CARDS[i].question) continue;
    if (skillFilter && skillFilter !== 'all' && CARDS[i].skill !== skillFilter) continue;
    var s = state.srs[CARDS[i].id];
    if (s && s.nextReview <= today) count++;
  }
  return count;
}
function getSrsLabel(cardId) {
  var s = state.srs[cardId];
  if (!s) return '';
  var days = SRS_INTERVALS[s.level] || 60;
  var labels = ['1d','3d','7d','14d','30d','60d'];
  return labels[s.level] || '60d+';
}

    if (saved === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('themeBtn').textContent = '芒聵聙茂赂聫';
    }
  } catch(e) {}
}

// ====== INIT ======
function init() {
  initTheme();
  loadState();
  buildFilterBar();
  buildFilterModal();
  applyFilters();
}

function loadState() {
  try {
    localStorage.setItem('_test', '1');
    localStorage.removeItem('_test');
    state.canSave = true;
  } catch(e) {
    state.canSave = false;
  }
  if (state.canSave) {
    try {
      var saved = localStorage.getItem('ankicard_state');
      if (saved) {
        var s = JSON.parse(saved);
        if (s.results) state.results = s.results;
        if (s.reviewMarked) state.reviewMarked = s.reviewMarked;
        if (s.history) state.history = s.history;
        if (s.memos) state.memos = s.memos;
        if (s.srs) state.srs = s.srs;
      }
    } catch(e) {}
  }
  if (!state.canSave) {
    setTimeout(function() {
      var banner = document.createElement('div');
      banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:300;background:#d97706;color:#1a1d27;text-align:center;padding:10px 16px;font-size:13px;font-weight:600;';
      banner.textContent = '\u26a0 \u30d7\u30ec\u30d3\u30e5\u30fc\u74b0\u5883\u306e\u305f\u3081\u4fdd\u5b58\u3067\u304d\u307e\u305b\u3093\u3002\u30c0\u30a6\u30f3\u30ed\u30fc\u30c9\u3057\u3066Safari\u3067\u958b\u3044\u3066\u304f\u3060\u3055\u3044\u3002';
      document.body.appendChild(banner);
    }, 500);
  }
}

function saveState() {
  if (!state.canSave) return;
  try {
    localStorage.setItem('ankicard_state', JSON.stringify({
      results: state.results,
      reviewMarked: state.reviewMarked,
      history: state.history,
      memos: state.memos,
      srs: state.srs
    }));
  } catch(e) {}
}

// ====== FILTER BAR (quick) ======
function buildFilterBar() {
  var bar = document.getElementById('filterBar');
  var dueAll = getDueCount('all');
  var chips = [
    { label: '氓聟篓茫聛娄', value: 'all' },
    { label: '盲禄聤忙聴楼茫聛庐氓戮漏莽驴聮' + (dueAll > 0 ? ' ' + dueAll : ''), value: 'due_today' },
    { label: '茅聳聯茅聛聲茫聛聞茫聛庐茫聛驴', value: 'wrong_only' },
    { label: '猫娄聛氓戮漏莽驴聮', value: 'review' }
  ];
  for (var i = 0; i < SKILLS.length; i++) {
    var short = SKILLS[i].replace('茫聝聻茫聜鹿茫聜驴茫聝录','');
    chips.push({ label: short, value: SKILLS[i] });
  }
  var html = '';
  for (var i = 0; i < chips.length; i++) {
    var active = (i === 0) ? ' active' : '';
    var cls = 'filter-chip' + active;
    if (chips[i].value === 'due_today' && dueAll > 0) cls += ' due';
    html += '<button class="' + cls + '" data-filter="' + chips[i].value + '" onclick="quickFilter(this)">' + chips[i].label + '</button>';
  }
  bar.innerHTML = html;
}

function quickFilter(el) {
  var bar = document.getElementById('filterBar');
  var chips = bar.querySelectorAll('.filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  var val = el.getAttribute('data-filter');
  state.filterSubject = 'all';
  if (val === 'all') {
    state.filterSkill = 'all';
    state.filterStatus = 'all';
  } else if (val === 'review') {
    state.filterSkill = 'all';
    state.filterStatus = 'review';
  } else if (val === 'due_today') {
    state.filterSkill = 'all';
    state.filterStatus = 'due_today';
  } else if (val === 'wrong_only') {
    state.filterSkill = 'all';
    state.filterStatus = 'wrong_only';
  } else {
    state.filterSkill = val;
    state.filterStatus = 'all';
  }
  buildSubjectBar();
  applyFilters();
}

function getSubjectsForSkill(skill) {
  var subs = {};
  for (var i = 0; i < CARDS.length; i++) {
    if (!CARDS[i].question) continue;
    if (skill !== 'all' && CARDS[i].skill !== skill) continue;
    if (CARDS[i].subject) subs[CARDS[i].subject] = (subs[CARDS[i].subject] || 0) + 1;
  }
  return subs;
}

function buildSubjectBar() {
  var bar = document.getElementById('subjectBar');
  // Show subject bar for skill-specific or status-specific filters
  if (state.filterSkill === 'all' && state.filterStatus === 'all') {
    bar.style.display = 'none';
    return;
  }
  var subs = {};
  for (var i = 0; i < CARDS.length; i++) {
    var c = CARDS[i];
    if (!c.question) continue;
    if (state.filterSkill !== 'all' && c.skill !== state.filterSkill) continue;
    if (state.filterStatus === 'review' && !c.checked && !state.reviewMarked[c.id]) continue;
    if (state.filterStatus === 'due_today') {
      var s = state.srs[c.id];
      if (!s || s.nextReview > getToday()) continue;
    }
    if (state.filterStatus === 'wrong_only' && state.results[c.id] !== 'incorrect') continue;
    if (c.subject) subs[c.subject] = (subs[c.subject] || 0) + 1;
  }
  var keys = Object.keys(subs).sort();
  if (keys.length <= 1) {
    bar.style.display = 'none';
    return;
  }
  var total = 0;
  for (var i = 0; i < keys.length; i++) total += subs[keys[i]];
  var html = '<button class="filter-chip active" onclick="subjectFilter(this,\'all\')">氓聟篓莽搂聭莽聸庐 <small style="opacity:0.6">' + total + '</small></button>';
  for (var i = 0; i < keys.length; i++) {
    html += '<button class="filter-chip" onclick="subjectFilter(this,\'' + keys[i] + '\')">' + keys[i] + ' <small style="opacity:0.6">' + subs[keys[i]] + '</small></button>';
  }
  bar.innerHTML = html;
  bar.style.display = 'flex';
}

function subjectFilter(el, val) {
  var bar = document.getElementById('subjectBar');
  var chips = bar.querySelectorAll('.filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  state.filterSubject = val;
  applyFilters();
}

function toggleModalFilter(el, group) {
  var parent = el.parentElement;
  var chips = parent.querySelectorAll('.filter-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  var val = el.getAttribute('data-val');
  if (group === 'skill') state.filterSkill = val;
  if (group === 'subject') state.filterSubject = val;
  if (group === 'status') state.filterStatus = val;
}

function toggleFilterModal() {
  document.getElementById('filterModal').classList.toggle('show');
}
function closeFilterModal(e) {
  if (!e || e.target === document.getElementById('filterModal')) {
    document.getElementById('filterModal').classList.remove('show');
  }
}

// ====== APPLY FILTERS ======
function applyFilters() {
  state.filtered = [];
  var today = getToday();
  for (var i = 0; i < CARDS.length; i++) {
    var c = CARDS[i];
    if (!c.question) continue;
    if (state.filterSkill !== 'all' && c.skill !== state.filterSkill) continue;
    if (state.filterSubject !== 'all' && c.subject !== state.filterSubject) continue;
    if (state.filterStatus === 'review' && !c.checked && !state.reviewMarked[c.id]) continue;
    if (state.filterStatus === 'unanswered' && state.results[c.id]) continue;
    if (state.filterStatus === 'incorrect' && state.results[c.id] !== 'incorrect') continue;
    if (state.filterStatus === 'due_today') {
      var s = state.srs[c.id];
      if (!s || s.nextReview > today) continue;
    }
    if (state.filterStatus === 'wrong_only') {
      if (state.results[c.id] !== 'incorrect') continue;
    }
    state.filtered.push(c);
  }
  state.current = 0;
  state.flipped = false;
  state.completed = false;
  updateStats();
  renderCard();
}

// ====== SHUFFLE ======
function shuffleCards() {
  for (var i = state.filtered.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = state.filtered[i];
    state.filtered[i] = state.filtered[j];
    state.filtered[j] = tmp;
  }
  state.current = 0;
  state.flipped = false;
  state.completed = false;
  renderCard();
}

// ====== STATS ======
function updateStats() {
  var total = state.filtered.length;
  var correct = 0, incorrect = 0;
  for (var i = 0; i < state.filtered.length; i++) {
    var r = state.results[state.filtered[i].id];
    if (r === 'correct') correct++;
    if (r === 'incorrect') incorrect++;
  }
  var dueCount = getDueCount('all');
  document.getElementById('statTotal').textContent = '氓聟篓 ' + total + ' 忙聻職';
  document.getElementById('statCorrect').textContent = '\u2B55 ' + correct;
  document.getElementById('statIncorrect').textContent = '\u274C ' + incorrect;
  document.getElementById('statPos').textContent = (total > 0 ? (state.current + 1) : 0) + ' / ' + total;
  var dueEl = document.getElementById('statDue');
  if (dueEl) dueEl.textContent = '\uD83D\uDD14 ' + dueCount;
}

function renderSummary() {
  var area = document.getElementById('cardArea');
  var correct = 0, incorrect = 0, skipped = 0;
  for (var i = 0; i < state.filtered.length; i++) {
    var r = state.results[state.filtered[i].id];
    if (r === 'correct') correct++;
    else if (r === 'incorrect') incorrect++;
    else skipped++;
  }
  var total = state.filtered.length;
  var pct = total > 0 ? Math.round(correct / total * 100) : 0;

  var html = '<div class="summary">';
  html += '<div class="summary-title">茫聜禄茫聝聝茫聜路茫聝搂茫聝鲁氓庐聦盲潞聠茂录聛</div>';
  html += '<div class="summary-stats">';

  html += '<div class="summary-stat incorrect"><div class="num">' + incorrect + '</div><div class="label">盲赂聧忙颅拢猫搂拢</div></div>';
  html += '<div class="summary-stat"><div class="num">' + skipped + '</div><div class="label">忙聹陋氓聸聻莽颅聰</div></div>';
  html += '</div>';
  html += '<div style="font-size:48px;font-weight:900;margin-bottom:20px;color:' + (pct >= 80 ? 'var(--correct)' : pct >= 50 ? 'var(--warning)' : 'var(--incorrect)') + ';">' + pct + '%</div>';
  html += '<div class="btn-row"><button class="btn btn-next" onclick="restart()">茫聜聜茫聛聠盲赂聙氓潞娄</button></div>';

  html += '</div>';

}

// ====== INTERACTIONS ======
function flipCard() {
  var el = document.getElementById('cardFlip');
  if (el) {
    state.flipped = !state.flipped;
    if (state.flipped) el.classList.add('flipped');
    else el.classList.remove('flipped');
  }
}

function markResult(result) {
  var c = state.filtered[state.current];
  state.results[c.id] = result;
  // Append to history
  if (!state.history[c.id]) state.history[c.id] = [];
  var today = getToday();
  state.history[c.id].push({ date: today, result: result });
  // SRS update
  var cur = state.srs[c.id] || { level: 0, nextReview: today, lastReview: today };
  if (result === 'correct') {
    cur.level = Math.min(cur.level + 1, SRS_INTERVALS.length - 1);
  } else {
    cur.level = 0;
  }
  cur.lastReview = today;
  cur.nextReview = addDays(today, SRS_INTERVALS[cur.level]);
  state.srs[c.id] = cur;
  saveState();
  nextCard();
}

function toggleReview() {
  var c = state.filtered[state.current];
  if (state.reviewMarked[c.id]) {
    delete state.reviewMarked[c.id];
  } else {
    state.reviewMarked[c.id] = true;
  }
  saveState();
  renderCard();
}

function nextCard() {
  if (state.current < state.filtered.length - 1) {
    state.current++;
    state.flipped = false;
    renderCard();
  } else {
    state.completed = true;
    renderCard();
  }
}

function prevCard() {
  if (state.current > 0) {
    state.current--;
    state.flipped = false;
    renderCard();
  }
}

function restart() {
  state.current = 0;
  state.flipped = false;
  state.completed = false;
  renderCard();
}

function retryIncorrect() {
  var wrong = [];
  for (var i = 0; i < state.filtered.length; i++) {
    if (state.results[state.filtered[i].id] === 'incorrect') {
      wrong.push(state.filtered[i]);
    }
  }
  if (wrong.length === 0) {
    alert('盲赂聧忙颅拢猫搂拢茫聛庐茫聜芦茫聝录茫聝聣茫聛聦茫聛聜茫聜聤茫聛戮茫聛聸茫聜聯茫聙聜');
    return;
  }
  state.filtered = wrong;
  state.current = 0;
  state.flipped = false;
  state.completed = false;
  updateStats();
  renderCard();
}

function saveMemo() {
  var c = state.filtered[state.current];
  var el = document.getElementById('memoInput');
  if (el) {
    var val = el.value.trim();
    if (val) {
      state.memos[c.id] = val;
    } else {
      delete state.memos[c.id];
    }
    saveState();
  }
}

function clearHistory(cardId) {
  if (confirm('茫聛聯茫聛庐茫聜芦茫聝录茫聝聣茫聛庐氓聸聻莽颅聰氓卤楼忙颅麓茫聜聮茫聝陋茫聜禄茫聝聝茫聝聢茫聛聴茫聛戮茫聛聶茫聛聥茂录聼')) {
    delete state.history[cardId];
    delete state.results[cardId];
    saveState();
    renderCard();
  }
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Start
init();
</script>
